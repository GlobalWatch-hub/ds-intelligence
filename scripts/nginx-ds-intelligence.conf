server {
    listen 80;
    server_name dscredito.synertia-gw.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dscredito.synertia-gw.ai;

    ssl_certificate     /etc/letsencrypt/live/dscredito.synertia-gw.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dscredito.synertia-gw.ai/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Basic auth perimeter (htpasswd at /etc/nginx/.htpasswd-ds)
    auth_basic           "DS Intelligence";
    auth_basic_user_file /etc/nginx/.htpasswd-ds;

    client_max_body_size 5M;

    # FastAPI backend (port 8005)
    location /api/ {
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # Next.js static export served from /home/ubuntu/ds-engine/frontend-build
    # If running `next start` instead, proxy_pass to 127.0.0.1:3005.
    root /home/ubuntu/ds-engine/frontend/.next;
    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}
